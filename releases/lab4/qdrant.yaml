apiVersion: v1
kind: Namespace
metadata:
  name: qdrant
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: qdrant
  namespace: flux-system
spec:
  interval: 1h
  url: https://qdrant.github.io/qdrant-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: qdrant
spec:
  interval: 1h
  releaseName: qdrant
  chart:
    spec:
      chart: qdrant
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
  install:
    createNamespace: true
  values:
    replicaCount: 1
    persistence:
      enabled: false
    service:
      type: ClusterIP
