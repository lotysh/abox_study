apiVersion: v1
kind: Namespace
metadata:
  name: mcp-governance
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: mcp-governance
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/techwithhuz/mcp-security-governance.git
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: mcp-governance
spec:
  interval: 1h
  releaseName: mcp-governance
  chart:
    spec:
      chart: ./charts/mcp-governance
      sourceRef:
        kind: GitRepository
        name: mcp-governance
        namespace: flux-system
  install:
    createNamespace: true
  values:
    samples:
      install: true
    dashboard:
      service:
        type: ClusterIP
    ai:
      enabled: false
