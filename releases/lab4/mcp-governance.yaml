apiVersion: v1
kind: Namespace
metadata:
  name: mcp-governance
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mcp-governance
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/techwithhuz/charts/mcp-governance
  ref:
    tag: "1.0.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: mcp-governance
spec:
  interval: 1h
  releaseName: mcp-governance
  chartRef:
    kind: OCIRepository
    name: mcp-governance
    namespace: flux-system
  install:
    createNamespace: true
  values:
    samples:
      install: true
    dashboard:
      service:
        type: ClusterIP
    ai:
      enabled: false
