apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-upgrade-advisor
  namespace: kagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-upgrade-advisor
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "configmaps", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["ocirepositories", "helmrepositories", "gitrepositories"]
    verbs: ["get", "list"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list"]
  - apiGroups: ["agentgateway.dev"]
    resources: ["agentgatewaybackends"]
    verbs: ["get", "list"]
  - apiGroups: ["kagent.dev"]
    resources: ["agents", "mcpservers", "remotemcpservers", "modelconfigs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-upgrade-advisor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-upgrade-advisor
subjects:
  - kind: ServiceAccount
    name: platform-upgrade-advisor
    namespace: kagent
